<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Tra Cứu Đơn Hàng Hoàn Tiền
    </title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            padding: 30px 15px;

            font-family: Arial, sans-serif;

            background: #f5f5f5;
        }

        .container {

            max-width: 520px;

            margin: 0 auto;

            background: white;

            border-radius: 16px;

            padding: 30px;

            box-shadow:
                0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {

            margin: 0 0 20px;

            text-align: center;

            font-size: 30px;

            color: #111;
        }

        #updateDate {

            text-align: center;

            color: #666;

            font-size: 14px;

            margin-bottom: 25px;
        }

        .input-box {

            width: 100%;
        }

        input {

            width: 100%;

            padding: 15px;

            border: 2px solid #2e7d32;

            border-radius: 10px;

            outline: none;

            font-size: 16px;
        }

        input:focus {

            border-color: #1b5e20;
        }

        .search-btn {

            width: 100%;

            margin-top: 14px;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #2e7d32;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;
        }

        .search-btn:hover {

            background: #256428;
        }

        .message {

            margin-top: 25px;

            text-align: center;

            font-size: 18px;

            font-weight: bold;

            color: #d84315;

            display: none;
        }

        .total-box {

            display: none;

            margin-top: 25px;

            padding: 20px;

            border-radius: 14px;

            background: #fff3e0;

            border: 1px solid #ffcc80;

            text-align: center;
        }

        .total-label {

            font-size: 14px;

            color: #666;

            margin-bottom: 8px;
        }

        .total-value {

            font-size: 32px;

            font-weight: bold;

            color: #d84315;
        }

        .result-box {

            margin-top: 30px;

            display: none;
        }

        .product-card {

            background: #fafafa;

            border: 1px solid #e0e0e0;

            border-radius: 14px;

            padding: 22px;

            margin-bottom: 20px;
        }

        .product-card:last-child {

            margin-bottom: 0;
        }

        .result-item {

            margin-bottom: 18px;
        }

        .result-item:last-child {

            margin-bottom: 0;
        }

        .label {

            font-size: 14px;

            color: #666;

            margin-bottom: 6px;
        }

        .value {

            font-size: 18px;

            font-weight: bold;

            color: #111;

            line-height: 1.5;
        }

        .money {

            color: #d84315;
        }

        .rate {

            color: #2e7d32;
        }

        @media (max-width: 768px) {

            h1 {

                font-size: 26px;
            }

            .value {

                font-size: 17px;
            }

            .total-value {

                font-size: 28px;
            }
        }

    </style>

</head>
<body>

<div class="container">

    <h1>
        TRA CỨU ĐƠN HÀNG HOÀN TIỀN
    </h1>

    <div id="updateDate">
        Dữ liệu cập nhật gần nhất: --
    </div>

    <div class="input-box">

        <input
            type="text"
            id="orderInput"
            placeholder="Nhập ID đơn hàng"
            onkeypress="handleEnter(event)"
        />

        <button
            class="search-btn"
            onclick="searchOrder()"
        >
            TRA CỨU ĐƠN HÀNG
        </button>

    </div>

    <div
        class="message"
        id="messageBox"
    ></div>

    <div
        class="total-box"
        id="totalCashbackBox"
    >

        <div class="total-label">
            Tổng tiền hoàn dự kiến
        </div>

        <div
            class="total-value"
            id="totalCashback"
        >
            0đ
        </div>

    </div>

    <div
        class="result-box"
        id="resultBox"
    ></div>

</div>

<script>

const API_URL =
    "https://script.google.com/macros/s/AKfycbw4u1I63W3poAvt4ZS5ZkXJmjRRJf7jCV3AL4mwZs558_gGjjeZh1XaXRKJGvMqHjJY/exec";

function handleEnter(event) {

    if (event.key === "Enter") {

        searchOrder();
    }
}

function formatMoney(value) {

    return Math.floor(
        Number(value || 0)
    ).toLocaleString("vi-VN") + "đ";
}

function formatRate(value) {

    return (
        Number(value || 0) * 100
    )
    .toFixed(2)
    .replace(/\.00$/, "")
    .replace(/(\.\d)0$/, "$1") + "%";
}

function formatTime(value) {

    if (!value) {

        return "-";
    }

    return String(value)
        .replace("T", " ")
        .replace(".000Z", "");
}

async function searchOrder() {

    const orderId =
        document
            .getElementById("orderInput")
            .value
            .trim();

    const resultBox =
        document
            .getElementById("resultBox");

    const messageBox =
        document
            .getElementById("messageBox");

    const totalCashbackBox =
        document
            .getElementById("totalCashbackBox");

    const totalCashback =
        document
            .getElementById("totalCashback");

    if (!orderId) {

        alert(
            "Vui lòng nhập ID đơn hàng"
        );

        return;
    }

    resultBox.style.display =
        "none";

    resultBox.innerHTML = "";

    totalCashbackBox.style.display =
        "none";

    messageBox.style.display =
        "block";

    messageBox.innerHTML =
        "Đang tra cứu dữ liệu...";

    try {

        const response =
            await fetch(
                API_URL +
                "?id=" +
                encodeURIComponent(orderId)
            );

        if (!response.ok) {

            throw new Error(
                "API Error"
            );
        }

        const responseData =
            await response.json();

        const data =
            responseData.data || [];

        document.getElementById(
            "updateDate"
        ).innerHTML =
            "Dữ liệu cập nhật gần nhất: " +
            (
                responseData.updateDate || "--"
            );

        if (
            !data ||
            (
                Array.isArray(data) &&
                data.length === 0
            )
        ) {

            resultBox.style.display =
                "none";

            totalCashbackBox.style.display =
                "none";

            messageBox.innerHTML =
                "Không có dữ liệu đơn hàng";

            return;
        }

        const items =
            Array.isArray(data)
            ? data
            : [data];

        let html = "";

        let total = 0;

        let validProductCount = 0;

        items.forEach(item => {

            const cashback =
                Number(
                    item.cashback || 0
                );

            // Bỏ qua sản phẩm không có hoàn tiền

            if (cashback <= 0) {

                return;
            }

            validProductCount++;

            total += cashback;

            html += `

                <div class="product-card">

                    <div class="result-item">

                        <div class="label">
                            Trạng thái đơn hàng
                        </div>

                        <div class="value">

                            ${item.status || "-"}

                        </div>

                    </div>

                    <div class="result-item">

                        <div class="label">
                            Giá trị sản phẩm sau áp mã
                        </div>

                        <div class="value money">

                            ${formatMoney(item.amount)}

                        </div>

                    </div>

                    <div class="result-item">

                        <div class="label">
                            Tỷ lệ hoàn tiền
                        </div>

                        <div class="value rate">

                            ${formatRate(item.rate)}

                        </div>

                    </div>

                    <div class="result-item">

                        <div class="label">
                            Tiền hoàn dự kiến
                        </div>

                        <div class="value money">

                            ${formatMoney(item.cashback)}

                        </div>

                    </div>

                    <div class="result-item">

                        <div class="label">
                            Thời gian đặt hàng
                        </div>

                        <div class="value">

                            ${formatTime(item.time)}

                        </div>

                    </div>

                </div>

            `;
        });

        // Có đơn nhưng không có cashback

        if (validProductCount === 0) {

            resultBox.style.display =
                "none";

            totalCashbackBox.style.display =
                "none";

            messageBox.innerHTML =
                "Sản phẩm này không có hoàn tiền";

            return;
        }

        totalCashback.innerHTML =
            formatMoney(total);

        totalCashbackBox.style.display =
            "block";

        resultBox.innerHTML =
            html;

        messageBox.innerHTML =
            "";

        messageBox.style.display =
            "none";

        resultBox.style.display =
            "block";

    } catch (error) {

        console.log(error);

        resultBox.style.display =
            "none";

        totalCashbackBox.style.display =
            "none";

        messageBox.style.display =
            "block";

        messageBox.innerHTML =
            "Lỗi tra cứu dữ liệu";
    }
}

</script>

</body>
</html>
