<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Tra Cứu Đơn Hàng Hoàn Tiền
    </title>

    <style>

        * {

            box-sizing: border-box;
        }

        body {

            margin: 0;

            padding: 30px 15px;

            font-family: Arial, sans-serif;

            background: #f5f5f5;
        }

        .container {

            max-width: 1100px;

            margin: 0 auto;

            background: white;

            border-radius: 14px;

            padding: 30px;

            box-shadow:
                0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {

            margin: 0;

            text-align: center;

            font-size: 34px;

            color: #111;
        }

        .top-box {

            display: flex;

            gap: 30px;

            margin-top: 35px;

            flex-wrap: wrap;
        }

        .input-box {

            width: 300px;
        }

        textarea {

            width: 100%;

            height: 180px;

            border: 2px solid #2e7d32;

            border-radius: 10px;

            padding: 14px;

            resize: none;

            outline: none;

            font-size: 15px;

            line-height: 1.6;
        }

        textarea:focus {

            border-color: #1b5e20;
        }

        .search-btn {

            width: 100%;

            margin-top: 14px;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #2e7d32;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;
        }

        .search-btn:hover {

            background: #256428;
        }

        .note {

            flex: 1;

            min-width: 260px;

            line-height: 1.9;

            font-size: 15px;
        }

        .note-title {

            font-weight: bold;

            margin-bottom: 10px;
        }

        .red {

            color: red;

            font-weight: bold;
        }

        .table-wrap {

            margin-top: 40px;

            overflow-x: auto;
        }

        table {

            width: 100%;

            border-collapse: collapse;
        }

        .table-title {

            background: #d84315;

            color: white;

            font-weight: bold;

            font-size: 18px;

            text-align: center;

            padding: 14px;
        }

        th {

            background: #e64a19;

            color: white;

            padding: 14px 10px;

            border: 1px solid #cc3d13;

            font-size: 14px;
        }

        td {

            padding: 13px 10px;

            border: 1px solid #ddd;

            text-align: center;

            font-size: 14px;
        }

        .success {

            background: #e8f5e9;
        }

        .not-found {

            color: red;

            font-weight: bold;
        }

        .loading {

            text-align: center;

            padding: 20px;

            color: #666;
        }

        .money {

            color: #d84315;

            font-weight: bold;
        }

        @media (max-width: 768px) {

            .top-box {

                flex-direction: column;
            }

            .input-box {

                width: 100%;
            }
        }

    </style>

</head>
<body>

<div class="container">

    <h1>
        TRA CỨU ĐƠN HÀNG HOÀN TIỀN
    </h1>

    <div class="top-box">

        <div class="input-box">

            <textarea
                id="orderInput"
                placeholder="Nhập ID đơn hàng&#10;Mỗi dòng 1 ID"
            ></textarea>

            <button
                class="search-btn"
                onclick="searchOrders()"
            >
                TRA CỨU ĐƠN HÀNG
            </button>

        </div>

    </div>

    <div class="table-wrap">

        <table>

            <thead>

                <tr>

                    <td
                        colspan="6"
                        class="table-title"
                    >
                        THÔNG TIN ĐƠN HÀNG HOÀN TIỀN
                    </td>

                </tr>

                <tr>

                    <th>
                        ID đơn hàng
                    </th>

                    <th>
                        Trạng thái đặt hàng
                    </th>

                    <th>
                        Thời gian đặt hàng
                    </th>

                    <th>
                        Giá trị đơn hàng
                    </th>

                    <th>
                        Tỷ lệ hoàn tiền
                    </th>

                    <th>
                        Tiền hoàn dự kiến
                    </th>

                </tr>

            </thead>

            <tbody id="resultBody">

                <tr>

                    <td colspan="6">

                        Chưa có dữ liệu

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

/*

====================================

THAY LINK API CỦA BẠN Ở ĐÂY

====================================

*/

const API_URL =
    "https://script.google.com/macros/s/AKfycbxckbuKqcA56Hcpw_IOx_JwTY8A78ln0quGgCUFmkqnY2_rBhgN6hRD390ClhG1fqgstg/exec";

/*

====================================

TRA CỨU ĐƠN HÀNG

====================================

*/

async function searchOrders() {

    const input =
        document
            .getElementById("orderInput")
            .value
            .trim();

    const resultBody =
        document
            .getElementById("resultBody");

    if (!input) {

        alert(
            "Vui lòng nhập ID đơn hàng"
        );

        return;
    }

    const orderIds =
        input
            .split("\n")
            .map(id => id.trim())
            .filter(id => id);

    resultBody.innerHTML =
        `
        <tr>

            <td
                colspan="6"
                class="loading"
            >

                Đang tra cứu dữ liệu...

            </td>

        </tr>
        `;

    let html = "";

    for (const orderId of orderIds) {

        try {

            const response =
                await fetch(

                    API_URL +
                    "?id=" +
                    encodeURIComponent(orderId)

                );

            const data =
                await response.json();

            if (!data) {

                html += `
                    <tr>

                        <td>

                            ${orderId}

                        </td>

                        <td
                            colspan="5"
                            class="not-found"
                        >

                            Không tìm thấy đơn hàng

                        </td>

                    </tr>
                `;

                continue;
            }

            html += `
                <tr class="success">

                    <td>

                        ${data.orderId}

                    </td>

                    <td>

                        ${data.status}

                    </td>

                    <td>

                        ${data.time}

                    </td>

                    <td>

                        <span class="money">

                            ${Number(
                                data.amount
                            ).toLocaleString("vi-VN")}đ

                        </span>

                    </td>

                    <td>

                        ${data.rate}%

                    </td>

                    <td>

                        <span class="money">

                            ${Number(
                                data.cashback
                            ).toLocaleString("vi-VN")}đ

                        </span>

                    </td>

                </tr>
            `;

        } catch (error) {

            html += `
                <tr>

                    <td>

                        ${orderId}

                    </td>

                    <td
                        colspan="5"
                        class="not-found"
                    >

                        Lỗi tra cứu dữ liệu

                    </td>

                </tr>
            `;
        }
    }

    resultBody.innerHTML = html;
}

</script>

</body>
</html>
