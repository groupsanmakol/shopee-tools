<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Tra Cứu Đơn Hàng Hoàn Tiền
    </title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            padding: 30px 15px;

            font-family: Arial, sans-serif;

            background: #f5f5f5;
        }

        .container {

            max-width: 520px;

            margin: 0 auto;

            background: white;

            border-radius: 16px;

            padding: 30px;

            box-shadow:
                0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {

            margin: 0 0 30px;

            text-align: center;

            font-size: 30px;

            color: #111;
        }

        .input-box {

            width: 100%;
        }

        input {

            width: 100%;

            padding: 15px;

            border: 2px solid #2e7d32;

            border-radius: 10px;

            outline: none;

            font-size: 16px;
        }

        input:focus {

            border-color: #1b5e20;
        }

        .search-btn {

            width: 100%;

            margin-top: 14px;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #2e7d32;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;
        }

        .search-btn:hover {

            background: #256428;
        }

        .message {

            margin-top: 25px;

            text-align: center;

            font-size: 18px;

            font-weight: bold;

            color: #d84315;

            display: none;
        }

        .result-box {

            margin-top: 30px;

            border-radius: 14px;

            background: #fafafa;

            border: 1px solid #e0e0e0;

            padding: 22px;

            display: none;
        }

        .result-item {

            margin-bottom: 18px;
        }

        .label {

            font-size: 14px;

            color: #666;

            margin-bottom: 6px;
        }

        .value {

            font-size: 20px;

            font-weight: bold;

            color: #111;
        }

        .money {

            color: #d84315;
        }

        .rate {

            color: #2e7d32;
        }

        .loading {

            color: #666;
        }

        @media (max-width: 768px) {

            h1 {

                font-size: 26px;
            }

            .value {

                font-size: 18px;
            }
        }

    </style>

</head>
<body>

<div class="container">

    <h1>
        TRA CỨU ĐƠN HÀNG HOÀN TIỀN
    </h1>

    <div class="input-box">

        <input
            type="text"
            id="orderInput"
            placeholder="Nhập ID đơn hàng"
        />

        <button
            class="search-btn"
            onclick="searchOrder()"
        >
            TRA CỨU ĐƠN HÀNG
        </button>

    </div>

    <div
        class="message"
        id="messageBox"
    ></div>

    <div
        class="result-box"
        id="resultBox"
    >

        <div class="result-item">

            <div class="label">
                Giá trị đơn hàng
            </div>

            <div
                class="value money"
                id="amount"
            ></div>

        </div>

        <div class="result-item">

            <div class="label">
                Tỷ lệ hoàn tiền
            </div>

            <div
                class="value rate"
                id="rate"
            ></div>

        </div>

        <div class="result-item">

            <div class="label">
                Tiền hoàn dự kiến
            </div>

            <div
                class="value money"
                id="cashback"
            ></div>

        </div>

        <div class="result-item">

            <div class="label">
                Thời gian đặt hàng
            </div>

            <div
                class="value"
                id="time"
            ></div>

        </div>

    </div>

</div>

<script>

const API_URL =
    "https://script.google.com/macros/s/AKfycbwyqT1UHYGXIaQElUIWWDjAbn5gPcYMtfcbfQ115hTmwE97dRHZ4w8r7B63fG3fJwk8/exec";

async function searchOrder() {

    const orderId =
        document
            .getElementById("orderInput")
            .value
            .trim();

    const resultBox =
        document
            .getElementById("resultBox");

    const messageBox =
        document
            .getElementById("messageBox");

    if (!orderId) {

        alert(
            "Vui lòng nhập ID đơn hàng"
        );

        return;
    }

    resultBox.style.display =
        "none";

    messageBox.style.display =
        "block";

    messageBox.innerHTML =
        "Đang tra cứu dữ liệu...";

    try {

        const response =
            await fetch(

                API_URL +
                "?id=" +
                encodeURIComponent(orderId)

            );

        const data =
            await response.json();

        if (
            !data ||
            data.length === 0
        ) {

            resultBox.style.display =
                "none";

            messageBox.innerHTML =
                "Không có dữ liệu đơn hàng";

            return;
        }

        const item = data[0];

        document.getElementById(
            "amount"
        ).innerHTML =
            Number(
                item.amount
            ).toLocaleString("vi-VN") + "đ";

        document.getElementById(
            "rate"
        ).innerHTML =
            (
                Number(item.rate) * 100
            ).toFixed(0) + "%";

        document.getElementById(
            "cashback"
        ).innerHTML =
            Number(
                item.cashback
            ).toLocaleString("vi-VN") + "đ";

        document.getElementById(
            "time"
        ).innerHTML =
            item.time;

        messageBox.style.display =
            "none";

        resultBox.style.display =
            "block";

    } catch (error) {

        console.log(error);

        resultBox.style.display =
            "none";

        messageBox.style.display =
            "block";

        messageBox.innerHTML =
            "Lỗi tra cứu dữ liệu";
    }
}

</script>

</body>
</html>
