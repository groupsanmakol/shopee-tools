<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Tra Cứu Đơn Hàng Hoàn Tiền
    </title>

    <style>

        * {

            box-sizing: border-box;
        }

        body {

            margin: 0;

            padding: 30px 15px;

            font-family: Arial, sans-serif;

            background: #f5f5f5;
        }

        .container {

            max-width: 1000px;

            margin: 0 auto;

            background: white;

            border-radius: 14px;

            padding: 30px;

            box-shadow:
                0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {

            margin: 0 0 30px;

            text-align: center;

            font-size: 34px;

            color: #111;
        }

        .input-box {

            max-width: 350px;

            margin: 0 auto;
        }

        textarea {

            width: 100%;

            height: 180px;

            border: 2px solid #2e7d32;

            border-radius: 10px;

            padding: 14px;

            resize: none;

            outline: none;

            font-size: 15px;

            line-height: 1.6;
        }

        textarea:focus {

            border-color: #1b5e20;
        }

        .search-btn {

            width: 100%;

            margin-top: 14px;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #2e7d32;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;
        }

        .search-btn:hover {

            background: #256428;
        }

        .message {

            margin-top: 30px;

            text-align: center;

            font-size: 18px;

            font-weight: bold;

            color: #d84315;

            display: none;
        }

        .table-wrap {

            margin-top: 40px;

            overflow-x: auto;

            display: none;
        }

        table {

            width: 100%;

            border-collapse: collapse;
        }

        .table-title {

            background: #d84315;

            color: white;

            font-weight: bold;

            font-size: 18px;

            text-align: center;

            padding: 14px;
        }

        th {

            background: #e64a19;

            color: white;

            padding: 14px 10px;

            border: 1px solid #cc3d13;

            font-size: 14px;
        }

        td {

            padding: 13px 10px;

            border: 1px solid #ddd;

            text-align: center;

            font-size: 14px;
        }

        .success {

            background: #e8f5e9;
        }

        .money {

            color: #d84315;

            font-weight: bold;
        }

        .loading {

            text-align: center;

            padding: 20px;

            color: #666;
        }

        @media (max-width: 768px) {

            h1 {

                font-size: 28px;
            }
        }

    </style>

</head>
<body>

<div class="container">

    <h1>
        TRA CỨU ĐƠN HÀNG HOÀN TIỀN
    </h1>

    <div class="input-box">

        <textarea
            id="orderInput"
            placeholder="Nhập ID đơn hàng&#10;Mỗi dòng 1 ID"
        ></textarea>

        <button
            class="search-btn"
            onclick="searchOrders()"
        >
            TRA CỨU ĐƠN HÀNG
        </button>

    </div>

    <div
        class="message"
        id="messageBox"
    ></div>

    <div
        class="table-wrap"
        id="tableWrap"
    >

        <table>

            <thead>

                <tr>

                    <td
                        colspan="6"
                        class="table-title"
                    >
                        THÔNG TIN ĐƠN HÀNG HOÀN TIỀN
                    </td>

                </tr>

                <tr>

                    <th>
                        ID đơn hàng
                    </th>

                    <th>
                        Trạng thái đặt hàng
                    </th>

                    <th>
                        Thời gian đặt hàng
                    </th>

                    <th>
                        Giá trị đơn hàng
                    </th>

                    <th>
                        Tỷ lệ hoàn tiền
                    </th>

                    <th>
                        Tiền hoàn dự kiến
                    </th>

                </tr>

            </thead>

            <tbody id="resultBody">

            </tbody>

        </table>

    </div>

</div>

<script>

/*

==============================

THAY API CỦA BẠN

==============================

*/

const API_URL =
    "YOUR_APPS_SCRIPT_API_URL";

/*

==============================

TRA CỨU ĐƠN HÀNG

==============================

*/

async function searchOrders() {

    const input =
        document
            .getElementById("orderInput")
            .value
            .trim();

    const resultBody =
        document
            .getElementById("resultBody");

    const tableWrap =
        document
            .getElementById("tableWrap");

    const messageBox =
        document
            .getElementById("messageBox");

    if (!input) {

        alert(
            "Vui lòng nhập ID đơn hàng"
        );

        return;
    }

    tableWrap.style.display = "none";

    messageBox.style.display = "block";

    messageBox.innerHTML =
        "Đang tra cứu dữ liệu...";

    const orderIds =
        input
            .split("\n")
            .map(id => id.trim())
            .filter(id => id);

    let html = "";

    let found = false;

    for (const orderId of orderIds) {

        try {

            const response =
                await fetch(

                    API_URL +
                    "?id=" +
                    encodeURIComponent(orderId)

                );

            const data =
                await response.json();

            if (!data) {

                continue;
            }

            found = true;

            html += `
                <tr class="success">

                    <td>

                        ${data.orderId}

                    </td>

                    <td>

                        ${data.status}

                    </td>

                    <td>

                        ${data.time}

                    </td>

                    <td>

                        <span class="money">

                            ${Number(
                                data.amount
                            ).toLocaleString("vi-VN")}đ

                        </span>

                    </td>

                    <td>

                        ${data.rate}%

                    </td>

                    <td>

                        <span class="money">

                            ${Number(
                                data.cashback
                            ).toLocaleString("vi-VN")}đ

                        </span>

                    </td>

                </tr>
            `;

        } catch (error) {

            console.log(error);
        }
    }

    if (!found) {

        tableWrap.style.display =
            "none";

        messageBox.style.display =
            "block";

        messageBox.innerHTML =
            "Không có dữ liệu đơn hàng";

        return;
    }

    resultBody.innerHTML = html;

    messageBox.style.display =
        "none";

    tableWrap.style.display =
        "block";
}

</script>

</body>
</html>
