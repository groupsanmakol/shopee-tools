<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra tiền hoàn dự kiến</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            padding: 40px 20px;
            text-align: center;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #ee4d2d;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 6px;
            background: #ee4d2d;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #d63d1e;
        }

        .result {
            margin-top: 25px;
            text-align: left;
            background: #fafafa;
            border: 1px dashed #ee4d2d;
            padding: 15px;
            border-radius: 8px;
            display: none;
            line-height: 1.7;
        }

        .title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: #222;
        }

        .money {
            color: #ee4d2d;
            font-weight: bold;
            font-size: 20px;
        }

        .loading {
            color: #666;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Kiểm Tra Tiền Hoàn Dự Kiến</h1>

    <p>
        Dán link sản phẩm Shopee để xem tiền hoàn dự kiến
    </p>

    <input
        type="text"
        id="productLink"
        placeholder="Nhập link Shopee..."
    >

    <button onclick="checkCommission()">
        Kiểm Tra Tiền Hoàn
    </button>

    <div class="result" id="resultBox">

        <div class="title" id="productName"></div>

        <div>
            Giá sản phẩm:
            <span id="productPrice"></span>
        </div>
        <div style="display:none;">
    Hoa hồng Xtra:
    <span id="commissionFull"></span>
</div>


        <div>
            Tiền hoàn có thể nhận được:
            <span
                class="money"
                id="commissionHalf"
            ></span>
        </div>

    </div>

</div>

<script>

async function checkCommission() {

    const input =
        document.getElementById("productLink");

    const link = input.value.trim();

    const resultBox =
        document.getElementById("resultBox");

    const productName =
        document.getElementById("productName");

    const productPrice =
        document.getElementById("productPrice");

    const commissionFull =
        document.getElementById("commissionFull");

    const commissionHalf =
        document.getElementById("commissionHalf");

    if (!link) {

        alert("Vui lòng nhập link Shopee");

        return;
    }

    resultBox.style.display = "block";

    productName.innerHTML =
        "<span class='loading'>Đang xử lý dữ liệu...</span>";

    productPrice.innerHTML = "";
    commissionFull.innerHTML = "";
    commissionHalf.innerHTML = "";

    try {

        const response = await fetch(
            "https://data.addlivetag.com/product-data/product-data.php?url=" +
            encodeURIComponent(link)
        );

        const data = await response.json();

        if (!data.productInfo) {
            throw new Error("Không lấy được dữ liệu");
        }

        const info = data.productInfo;

        const name =
            info.productName || "Không rõ tên";

        const price =
            Number(info.price || 0);

        const commission =
            Number(info.commission || 0);

        const halfCommission =
            Math.round(commission * 0.5);

        productName.innerHTML = name;

        productPrice.innerHTML =
            price.toLocaleString("vi-VN") + "đ";

        commissionFull.innerHTML =
            commission.toLocaleString("vi-VN") + "đ";

        commissionHalf.innerHTML =
            halfCommission.toLocaleString("vi-VN") + "đ";

    } catch (error) {

        productName.innerHTML =
            "Không lấy được dữ liệu.";

        console.log(error);
    }
}

</script>

</body>
</html>
